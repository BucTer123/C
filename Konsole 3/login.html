<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
        body {
                background: whitesmoke;
                color: black;
                font-family: sans-serif;
                font-size: medium;
                font-weight: bolder;
                font-style: initial;
                padding: 0;
                margin: 0;
            }
            .inputs-main {
                padding: 80px;
                margin: 60px;
                background: ghostwhite;
                color: black;
                border: 1px solid dimgray;
            }
            .inputs:focus {
                border: 1px solid black;
            }

            button {
                background: black;
                color: white;
                padding: 12px;
                margin: 6px;
                border: 1px solid dimgray;
                opacity: 1;
            }

            button:focus {
                border: 1px solid black;
                background: white;
                color: black;
            }

            button:hover {
                opacity: 0.7;
                transform: translateY(4px);
            }

            button:active {
                opacity: 0.3;
                transform: translateX(5px);
            }

            input {
                background: white;
                color: black;
                padding: 10px;
                margin: 5px;
                border: 1px solid dimgray;
            }

            input:focus {
                background: black;
                color: white;
                border: 1px solid black;
            }
</style>
<body>
    <div class="inputs">
        5 + 8 = ?
        <input class="log_inp" type="text" placeholder=":" />
        <button id="log_butt" type="button">Send</button>
    </div>
</body>
<script>
    const inp = document.getElementById("log_inp").value;
    const btn = document.getElementById("log_butt");

    btn.addEventListener("click", function () {
        if (inp === "13") {
            window.alert("Okay!");
            window.open("main.html");
        } else {
            window.alert("ERROR!: Bad answer! Are you DUMB?");
        }
    });
</script>
</html>
